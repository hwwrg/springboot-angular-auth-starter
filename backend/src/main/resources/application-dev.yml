authstarter:
  graphql:
    # Local developer convenience. Keep disabled in deployed profiles.
    introspection-enabled: true
  auth:
    baseline:
      # Local-only demo break-glass credentials. Do not use in deployed environments.
      username: operator@authstarter.local
      password: authstarter-local-password
      display-name: Baseline Operator
      role: SUPERADMIN
      break-glass-enabled: true
      additional-users:
        - email: org-admin@authstarter.local
          password: authstarter-local-password
          display-name: Demo Organization Admin
          role: ORG_ADMIN
        - email: user@authstarter.local
          password: authstarter-local-password
          display-name: Demo User
          role: USER
