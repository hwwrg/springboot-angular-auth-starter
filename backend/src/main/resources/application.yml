spring:
  application:
    name: springboot-angular-auth-starter-backend
  datasource:
    url: ${AUTH_STARTER_DATASOURCE_URL:jdbc:postgresql://localhost:5432/authstarter}
    username: ${AUTH_STARTER_DATASOURCE_USERNAME:authstarter}
    password: ${AUTH_STARTER_DATASOURCE_PASSWORD:authstarter}
  flyway:
    enabled: true
    locations: classpath:db/migration
  graphql:
    graphiql:
      enabled: false

server:
  port: ${AUTH_STARTER_SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        name: AUTH_STARTER_SESSION
        http-only: true
        secure: ${AUTH_STARTER_SESSION_COOKIE_SECURE:true}
        same-site: ${AUTH_STARTER_SESSION_COOKIE_SAME_SITE:lax}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      validate-group-membership: false
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,diskSpace

logging:
  structured:
    format:
      console: logstash
  level:
    root: INFO
    com.example.authstarter: INFO

authstarter:
  auth:
    invitation:
      password-setup-url:
        base-url: ${AUTH_STARTER_INVITATION_PASSWORD_SETUP_URL:${AUTH_STARTER_FRONTEND_ORIGIN:http://localhost:4200}/accept-invite}
    password-reset:
      url:
        base-url: ${AUTH_STARTER_PASSWORD_RESET_URL:${AUTH_STARTER_FRONTEND_ORIGIN:http://localhost:4200}/reset-password}
    baseline:
      username: ${AUTH_STARTER_BASELINE_AUTH_USERNAME:}
      password: ${AUTH_STARTER_BASELINE_AUTH_PASSWORD:}
      display-name: ${AUTH_STARTER_BASELINE_AUTH_DISPLAY_NAME:Baseline Operator}
      role: ${AUTH_STARTER_BASELINE_AUTH_ROLE:USER}
      break-glass-enabled: ${AUTH_STARTER_BASELINE_AUTH_BREAK_GLASS_ENABLED:false}
  security:
    allowed-origins:
      - ${AUTH_STARTER_FRONTEND_ORIGIN:http://localhost:4200}
  graphql:
    max-query-depth: ${AUTH_STARTER_GRAPHQL_MAX_QUERY_DEPTH:12}
    max-query-complexity: ${AUTH_STARTER_GRAPHQL_MAX_QUERY_COMPLEXITY:200}
    max-request-bytes: ${AUTH_STARTER_GRAPHQL_MAX_REQUEST_BYTES:32768}
    introspection-enabled: ${AUTH_STARTER_GRAPHQL_INTROSPECTION_ENABLED:false}
  notification:
    email:
      provider: ${AUTH_STARTER_NOTIFICATION_EMAIL_PROVIDER:local-mock}
      from-email: ${AUTH_STARTER_NOTIFICATION_EMAIL_FROM_EMAIL:no-reply@authstarter.local}
      from-name: ${AUTH_STARTER_NOTIFICATION_EMAIL_FROM_NAME:Spring Boot Angular Auth Starter}
      reply-to-email: ${AUTH_STARTER_NOTIFICATION_EMAIL_REPLY_TO_EMAIL:}
      smtp:
        host: ${AUTH_STARTER_SMTP_HOST:localhost}
        port: ${AUTH_STARTER_SMTP_PORT:1025}
        username: ${AUTH_STARTER_SMTP_USERNAME:}
        password: ${AUTH_STARTER_SMTP_PASSWORD:}
        protocol: ${AUTH_STARTER_SMTP_PROTOCOL:smtp}
        auth: ${AUTH_STARTER_SMTP_AUTH:false}
        start-tls: ${AUTH_STARTER_SMTP_START_TLS:false}
