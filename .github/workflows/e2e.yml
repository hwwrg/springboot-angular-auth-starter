name: e2e

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Start backend stack with mail catcher
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml up --build --detach
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Wait for the backend to become ready
        run: |
          for attempt in $(seq 1 60); do
            if curl --silent --fail --output /dev/null http://localhost:8080/auth/csrf; then
              echo "Backend is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not become ready in time." >&2
          docker compose -f docker-compose.yml -f docker-compose.e2e.yml logs backend >&2
          exit 1
      - name: Run end-to-end tests
        working-directory: frontend
        run: pnpm e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
      - name: Stop backend stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.e2e.yml down --volumes
