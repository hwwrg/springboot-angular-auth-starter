name: Feature request
description: Suggest an improvement to the auth starter
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep proposals generic. This is a reusable starter — it intentionally avoids application-specific workflows, real domains, and deployment-specific values.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What gap or pain point does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why this one is preferred.
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This stays generic and reusable (no app-specific business logic, secrets, or deployment values)
          required: true
