<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <radialGradient id="gold-glow2" cx="100%" cy="0%" r="50%">
      <stop offset="0%" stop-color="#c7a86a" stop-opacity="0.12" />
