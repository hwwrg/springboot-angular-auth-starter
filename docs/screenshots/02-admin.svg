  <rect x="754" y="420" width="500" height="62" rx="8" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
  <text x="774" y="445" fill="#f7f8fb" font-size="14" font-weight="600">User</text>
