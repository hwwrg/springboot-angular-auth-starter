  <line x1="272" y1="0" x2="272" y2="800" stroke="rgba(255,255,255,0.08)" stroke-width="1" />

  <!-- Sidebar brand -->
  <rect x="20" y="20" width="36" height="36" rx="9" fill="#c7a86a" />
  <text x="38" y="43" text-anchor="middle" fill="#16110a" font-size="18" font-weight="800">A</text>
  <text x="66" y="37" fill="#f7f8fb" font-size="15" font-weight="800">Auth Starter</text>
  <text x="66" y="52" fill="#9ba3b7" font-size="10" letter-spacing="0.08em">WORKSPACE</text>

  <!-- Sidebar nav -->
  <rect x="12" y="90" width="248" height="38" rx="8" fill="rgba(255,255,255,0.04)" />
