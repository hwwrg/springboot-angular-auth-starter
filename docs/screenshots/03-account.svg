  <text x="20" y="160" fill="#9ba3b7" font-size="10" letter-spacing="0.08em">ADMIN</text>
  <rect x="12" y="168" width="248" height="38" rx="8" />
  <text x="44" y="192" fill="#9ba3b7" font-size="13">User Management</text>

  <!-- Active: Account -->
  <rect x="12" y="214" width="248" height="38" rx="8" fill="rgba(199,168,106,0.12)" />
