  <rect x="328" y="558" width="406" height="40" rx="7" fill="#202635" stroke="rgba(255,255,255,0.14)" stroke-width="1" />
  <text x="344" y="583" fill="#9ba3b7" font-size="14">••••••••••••••••</text>

  <text x="328" y="620" fill="#f7f8fb" font-size="13" font-weight="500">Confirm new password</text>
  <rect x="328" y="630" width="406" height="40" rx="7" fill="#202635" stroke="rgba(255,255,255,0.14)" stroke-width="1" />
  <text x="344" y="655" fill="#9ba3b7" font-size="14">••••••••••••••••</text>

  <rect x="328" y="688" width="406" height="42" rx="8" fill="#c7a86a" />
  <text x="531" y="714" text-anchor="middle" fill="#16110a" font-size="14" font-weight="700">Update password</text>

