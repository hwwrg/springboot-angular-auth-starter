  <text x="328" y="390" fill="#9ba3b7" font-size="11" letter-spacing="0.08em">SECURITY</text>
  <text x="328" y="418" fill="#f7f8fb" font-size="20" font-weight="700">Change password</text>
  <text x="328" y="444" fill="#9ba3b7" font-size="13">Update your login password at any time.</text>

  <text x="328" y="476" fill="#f7f8fb" font-size="13" font-weight="500">Current password</text>
  <rect x="328" y="486" width="406" height="40" rx="7" fill="#202635" stroke="rgba(255,255,255,0.14)" stroke-width="1" />
