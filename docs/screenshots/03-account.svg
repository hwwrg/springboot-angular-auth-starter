  <text x="328" y="274" fill="#f7f8fb" font-size="14">operator@authstarter.local</text>
  <text x="328" y="304" fill="#9ba3b7" font-size="12">Roles</text>
  <text x="328" y="322" fill="#f7f8fb" font-size="14">SUPERADMIN</text>

