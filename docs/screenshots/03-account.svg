  <text x="798" y="212" fill="#f7f8fb" font-size="20" font-weight="700">Auth Starter Demo</text>
  <rect x="1132" y="166" width="82" height="24" rx="12" fill="rgba(61,177,137,0.15)" />
  <circle cx="1148" cy="178" r="4" fill="#3db189" />
  <text x="1162" y="183" fill="#3db189" font-size="11" font-weight="600">ACTIVE</text>
  <line x1="798" y1="232" x2="1234" y2="232" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
