  <rect x="774" y="360" width="480" height="400" rx="10" fill="#181d27" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  <text x="798" y="390" fill="#9ba3b7" font-size="11" letter-spacing="0.08em">ACCESS</text>
  <text x="798" y="418" fill="#f7f8fb" font-size="20" font-weight="700">Organization memberships</text>
  <text x="798" y="444" fill="#9ba3b7" font-size="13">All organizations you belong to in this workspace.</text>

  <!-- Membership table header -->
  <rect x="798" y="460" width="436" height="32" rx="6" fill="rgba(255,255,255,0.04)" />
  <text x="814" y="481" fill="#9ba3b7" font-size="12" font-weight="500">Organization</text>
  <text x="968" y="481" fill="#9ba3b7" font-size="12" font-weight="500">Workspace</text>
  <text x="1086" y="481" fill="#9ba3b7" font-size="12" font-weight="500">Role</text>
  <text x="1160" y="481" fill="#9ba3b7" font-size="12" font-weight="500">Status</text>

