  <text x="328" y="212" fill="#f7f8fb" font-size="20" font-weight="700">Operator</text>
  <rect x="666" y="166" width="58" height="24" rx="12" fill="rgba(61,177,137,0.15)" />
  <circle cx="682" cy="178" r="4" fill="#3db189" />
