  <text x="814" y="530" fill="#f7f8fb" font-size="14">Auth Starter Demo</text>
  <text x="968" y="530" fill="#f7f8fb" font-size="14">authstarter</text>
  <text x="1086" y="530" fill="#f7f8fb" font-size="14">SUPERADMIN</text>
  <rect x="1152" y="514" width="58" height="22" rx="11" fill="rgba(61,177,137,0.15)" />
  <text x="1181" y="530" text-anchor="middle" fill="#3db189" font-size="11" font-weight="600">ACTIVE</text>
